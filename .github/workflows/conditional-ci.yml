name: Conditional CI Pipeline
on: workflow_dispatch:
  inputs:
    run_tests:
      description: 'Run tests for feature branches'
      required: true
      default: 'false'
      type: boolean

jobs:
  build:                       
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: echo "Build completed!"

  test:                         
    runs-on: ubuntu-latest
    needs: build                
    if: startsWith(github.ref, 'refs/heads/feature/') && success()
    steps:
      - uses: actions/checkout@v3
      - run: echo "Running tests for feature branch!"
name: workflow_dispatch
on:
 workflow_dispatch:
   inputs: 
    application_name: 
        description: 'Enter the application name'
        required: true
        type: string
    run_validation: 
        description: 'Do you want to run validation?'
        required: true
        default: true
        type: boolean

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      validation_status: ${{ steps.validation.outputs.validation_status }}
    steps:
      - name: Validation
        id: validation
        if: ${{ github.event.inputs.run_validation == 'true' }}
        run: |
          echo "validation_status=success" >> $GITHUB_OUTPUT
        
  printvalidationstatus:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Print validation status
        run: |
          echo "Validation Status: ${{ needs.validate.outputs.validation_status }}"